<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DeployLens</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 700px;
    }

    h1 {
      font-size: 52px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      color: #b6c2d9;
      font-size: 18px;
      line-height: 1.6;
    }

    .tagline {
      margin-top: 15px;
      color: #7f8aa3;
      font-size: 14px;
    }

    .box {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    input {
      padding: 12px;
      width: 260px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: #4f46e5;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #4338ca;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #5f6b85;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>DeployLens</h1>

    <p>
      AI-powered DevOps observability that connects deployments, logs, metrics,
      and system changes into clear causal explanations of production issues.
    </p>

    <div class="box">
      <input type="email" placeholder="Enter email for early access"/>
      <button onclick="alert('You are on the waitlist!')">Join Waitlist</button>
    </div>

    <div class="tagline">
      From deployment → to root cause in seconds.
    </div>

    <div class="footer">
      Built for modern DevOps teams.
    </div>
  </div>

</body>
</html>
